version: "3.8"

networks:
  vps_net:
    driver: bridge

volumes:
  umami-data:

services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /srv/nginx/ssl:/etc/nginx/ssl:ro
      - /srv/nginx/certbot-webroot:/var/www/certbot:ro
    networks: [vps_net]
    depends_on: [app-prod, app-stage, umami]

  app-prod:
    build: /srv/repos/app-prod
    container_name: app-prod
    restart: unless-stopped
    env_file: /srv/.env.prod
    volumes:
      - /srv/data/prod:/app/data
    networks: [vps_net]

  app-stage:
    build: /srv/repos/app-stage
    container_name: app-stage
    restart: unless-stopped
    env_file: /srv/.env.stage
    volumes:
      - /srv/data/stage:/app/data
    networks: [vps_net]

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    env_file: /srv/.env.shared
    depends_on: [umami-db]
    networks: [vps_net]

  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    restart: unless-stopped
    env_file: /srv/.env.shared
    volumes:
      - umami-data:/var/lib/postgresql/data
    networks: [vps_net]

  openclaw:
    build: /srv/repos/openclaw
    container_name: openclaw
    restart: unless-stopped
    networks: [vps_net]
    # Weitere Config (Ports, Volumes) folgen je nach OpenClaw-Anforderungen

  deploy-service:
    build: /srv/deploy-service
    container_name: deploy-service
    restart: unless-stopped
    env_file: /srv/.env.shared
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-Zugriff für Builds
      - /srv:/srv                                   # Zugriff auf Repos + Scripts
    networks: [vps_net]
