version: "3.8"

services:
  app:
    build: .
    container_name: ai-wojtek-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/app.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://ai.wojtek-gorecki.de
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PH_API_TOKEN=${PH_API_TOKEN}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID}
      - NEXT_PUBLIC_UMAMI_URL=${NEXT_PUBLIC_UMAMI_URL}
      - FORMSPREE_ENDPOINT=${FORMSPREE_ENDPOINT}
    volumes:
      - app-data:/app/data
    depends_on:
      - nginx

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: ai-wojtek-umami
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      - umami-db

  umami-db:
    image: postgres:15-alpine
    container_name: ai-wojtek-umami-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - umami-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: ai-wojtek-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
      - umami

volumes:
  app-data:
  umami-data:
  certbot-webroot:
