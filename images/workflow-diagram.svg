<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161822"/>
    </linearGradient>
    <linearGradient id="humanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arRight" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#3b82f6"/></marker>
    <marker id="arRightG" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#10b981"/></marker>
    <marker id="arDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L4,8 L8,0" fill="#10b981"/></marker>
    <marker id="arDownB" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><path d="M0,0 L4,8 L8,0" fill="#3b82f6"/></marker>
    <marker id="arLeft" markerWidth="8" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8" fill="#10b981"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="680" fill="url(#bgGrad)" rx="16"/>

  <!-- Column Headers -->
  <rect x="60" y="20" width="280" height="36" rx="8" fill="#3b82f610"/>
  <text x="200" y="44" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="700" letter-spacing="2">MENSCH</text>
  <rect x="460" y="20" width="280" height="36" rx="8" fill="#10b98110"/>
  <text x="600" y="44" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700" letter-spacing="2">KI-AGENT</text>

  <!-- Divider line -->
  <line x1="400" y1="20" x2="400" y2="640" stroke="#ffffff10" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Step 1: Chat-Nachricht (Human) -->
  <circle cx="42" cy="105" r="14" fill="#3b82f630"/><text x="42" y="110" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">1</text>
  <rect x="60" y="76" width="280" height="58" rx="12" fill="#3b82f608" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="88" width="32" height="32" rx="8" fill="#3b82f620"/>
  <text x="88" y="110" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">W</text>
  <text x="116" y="102" fill="#e2e8f0" font-size="14" font-weight="600">Chat-Nachricht</text>
  <text x="116" y="122" fill="#94a3b8" font-size="11">Anforderung an den KI-Agenten</text>

  <!-- Arrow 1 → 2 -->
  <path d="M340 105 L458 105" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arRight)"/>

  <!-- Step 2: Code-Änderungen (Agent) -->
  <circle cx="758" cy="105" r="14" fill="#10b98130"/><text x="758" y="110" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">2</text>
  <rect x="460" y="76" width="280" height="58" rx="12" fill="#10b98108" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="472" y="88" width="32" height="32" rx="8" fill="#10b98120"/>
  <text x="488" y="110" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">&lt;/&gt;</text>
  <text x="516" y="102" fill="#e2e8f0" font-size="14" font-weight="600">Code-Änderungen</text>
  <text x="516" y="122" fill="#94a3b8" font-size="11">HTML, CSS, JS &amp; i18n anpassen</text>

  <!-- Arrow 2 → 3 -->
  <line x1="600" y1="134" x2="600" y2="192" stroke="#10b981" stroke-width="2" marker-end="url(#arDown)"/>

  <!-- Step 3: Deploy Staging (Agent) -->
  <circle cx="758" cy="225" r="14" fill="#10b98130"/><text x="758" y="230" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">3</text>
  <rect x="460" y="196" width="280" height="58" rx="12" fill="#10b98108" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="472" y="208" width="32" height="32" rx="8" fill="#10b98120"/>
  <text x="488" y="229" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700">GIT</text>
  <text x="516" y="222" fill="#e2e8f0" font-size="14" font-weight="600">Deployment auf Staging</text>
  <text x="516" y="242" fill="#94a3b8" font-size="11">Git Push &amp; automatisches Deploy</text>

  <!-- Arrow 3 → 4 (cross to left, with label) -->
  <path d="M460 225 L342 225" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arLeft)"/>
  <rect x="365" y="210" width="80" height="18" rx="4" fill="#0f1117"/>
  <text x="405" y="223" text-anchor="middle" fill="#64748b" font-size="9">Staging live</text>

  <!-- Arrow down on left side to step 4 -->
  <line x1="200" y1="240" x2="200" y2="312" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Step 4: Review (Human) -->
  <circle cx="42" cy="345" r="14" fill="#3b82f630"/><text x="42" y="350" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">4</text>
  <rect x="60" y="316" width="280" height="58" rx="12" fill="#3b82f608" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="328" width="32" height="32" rx="8" fill="#3b82f620"/>
  <text x="88" y="350" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Q</text>
  <text x="116" y="342" fill="#e2e8f0" font-size="14" font-weight="600">Review auf Staging</text>
  <text x="116" y="362" fill="#94a3b8" font-size="11">Visuelle Prüfung der Änderungen</text>

  <!-- Arrow 4 → 5 -->
  <line x1="200" y1="374" x2="200" y2="432" stroke="#3b82f6" stroke-width="2" marker-end="url(#arDownB)"/>

  <!-- Step 5: Freigabe (Human) -->
  <circle cx="42" cy="465" r="14" fill="#3b82f630"/><text x="42" y="470" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">5</text>
  <rect x="60" y="436" width="280" height="58" rx="12" fill="#3b82f608" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="448" width="32" height="32" rx="8" fill="#3b82f620"/>
  <text x="88" y="470" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">✓</text>
  <text x="116" y="462" fill="#e2e8f0" font-size="14" font-weight="600">Freigabe</text>
  <text x="116" y="482" fill="#94a3b8" font-size="11">Bestätigung per Chat-Nachricht</text>

  <!-- Arrow 5 → 6 -->
  <path d="M340 465 L458 465" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arRight)"/>

  <!-- Step 6: Deploy Production (Agent) -->
  <circle cx="758" cy="465" r="14" fill="#10b98130"/><text x="758" y="470" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">6</text>
  <rect x="460" y="436" width="280" height="58" rx="12" fill="#10b98108" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="472" y="448" width="32" height="32" rx="8" fill="#10b98120"/>
  <text x="488" y="469" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">PROD</text>
  <text x="516" y="462" fill="#e2e8f0" font-size="14" font-weight="600">Deployment auf Produktion</text>
  <text x="516" y="482" fill="#94a3b8" font-size="11">Merge &amp; Deploy auf Live-Seite</text>

  <!-- Iteration arrow (back from step 4 to step 1 area) -->
  <path d="M60 350 Q20 350 20 228 Q20 105 58 105" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arIterRight)"/>
  <defs>
    <marker id="arIterRight" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#f59e0b"/></marker>
  </defs>
  <rect x="4" y="218" width="56" height="18" rx="4" fill="#0f1117"/>
  <text x="32" y="231" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="500">Korrektur</text>

  <!-- Legend -->
  <rect x="200" y="555" width="400" height="85" rx="10" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
  <circle cx="240" cy="580" r="8" fill="#3b82f650"/>
  <text x="260" y="585" fill="#94a3b8" font-size="12">Schritte durch den Menschen</text>
  <circle cx="240" cy="607" r="8" fill="#10b98150"/>
  <text x="260" y="612" fill="#94a3b8" font-size="12">Schritte durch den KI-Agenten</text>
  <line x1="230" y1="630" x2="250" y2="630" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="260" y="635" fill="#94a3b8" font-size="12">Korrekturschleife (bei Bedarf)</text>
</svg>